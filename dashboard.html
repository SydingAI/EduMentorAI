<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EduMentorAI Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        input, button { margin: 5px 0; padding: 5px; width: 300px; }
        textarea { width: 300px; height: 100px; margin: 5px 0; }
        .section { margin-bottom: 20px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        h2 { margin-top: 0; }
    </style>
</head>
<body>

<h1>EduMentorAI Testing Dashboard</h1>

<div class="section">
    <h2>Login</h2>
    <input type="text" id="email" placeholder="Email"><br>
    <input type="password" id="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
    <p id="loginResult"></p>
</div>

<div class="section">
    <h2>AI Suggest Lesson (Lecturer)</h2>
    <input type="text" id="topic" placeholder="Topic"><br>
    <button onclick="suggestLesson()">Suggest Lesson</button>
    <p id="lessonResult"></p>
</div>

<div class="section">
    <h2>AI Generate Quiz (Lecturer)</h2>
    <input type="text" id="quizTopic" placeholder="Topic"><br>
    <input type="number" id="numQuestions" placeholder="Number of Questions" value="5"><br>
    <button onclick="generateQuiz()">Generate Quiz</button>
    <pre id="quizResult"></pre>
</div>

<div class="section">
    <h2>AI Feedback (Student)</h2>
    <textarea id="submission" placeholder="Paste your essay or submission here"></textarea><br>
    <button onclick="getFeedback()">Get Feedback</button>
    <pre id="feedbackResult"></pre>
</div>

<script>
let JWT_TOKEN = "";

// Login function
async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch("http://127.0.0.1:8000/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();
    if (res.ok) {
        JWT_TOKEN = data.access_token;
        document.getElementById("loginResult").innerText = "Login successful!";
    } else {
        document.getElementById("loginResult").innerText = data.detail || "Login failed!";
    }
}

// AI Suggest Lesson
async function suggestLesson() {
    const topic = document.getElementById("topic").value;
    const res = await fetch(`http://127.0.0.1:8000/lecturer/ai/suggest_lesson?topic=${encodeURIComponent(topic)}`, {
        headers: { "Authorization": `Bearer ${JWT_TOKEN}` }
    });
    const data = await res.json();
    document.getElementById("lessonResult").innerText = JSON.stringify(data, null, 2);
}

// AI Generate Quiz
async function generateQuiz() {
    const topic = document.getElementById("quizTopic").value;
    const numQuestions = document.getElementById("numQuestions").value;
    const res = await fetch(`http://127.0.0.1:8000/lecturer/ai/quiz?topic=${encodeURIComponent(topic)}&num_questions=${numQuestions}`, {
        headers: { "Authorization": `Bearer ${JWT_TOKEN}` }
    });
    const data = await res.json();
    document.getElementById("quizResult").innerText = JSON.stringify(data, null, 2);
}

// AI Feedback
async function getFeedback() {
    const submission = document.getElementById("submission").value;
    const res = await fetch("http://127.0.0.1:8000/student/ai/feedback", {
        method: "POST",
        headers: { 
            "Authorization": `Bearer ${JWT_TOKEN}`,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ submission_text: submission })
    });
    const data = await res.json();
    document.getElementById("feedbackResult").innerText = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
